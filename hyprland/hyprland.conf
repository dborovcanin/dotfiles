# -------------------------------------------------------
#  Hyprland configuration inspired by your i3 setup
# -------------------------------------------------------

# --- MONITORS -------------------------------------------------
monitor=eDP-1,preferred,auto,1
monitor=DP-1,preferred,auto,1

# --- GENERAL --------------------------------------------------
# Mod key (SUPER)
$mod = SUPER
$fileManager = nautilus
$term = footclient
$menu = rofi -show drun -show-icons -display-drun "Run"

# Theme colors
$background = rgba(40,42,46,1)
$background_alt = rgba(55,59,65,1)
$foreground = rgba(197,200,198,1)
$primary = rgba(219,194,145,1)
$secondary = rgba(138,190,183,1)
$alert = rgba(165,66,66,1)
$disabled = rgba(112,120,128,1)

# Rounded corners and borders
decoration {
    rounding = 6
}

general {
    gaps_in = 10
    gaps_out = 10
    border_size = 3
    col.active_border = $primary
    col.inactive_border = $background_alt
    layout = dwindle
}

animations {
    enabled = yes
    bezier = easeOut, 0.25, 1, 0.5, 1
    animation = windows, 1, 7, easeOut
    animation = workspaces, 1, 5, easeOut
}

misc {
    focus_on_activate = true
    vfr = true
}

# --- INPUT ----------------------------------------------------
input {
    kb_layout = us,rs,rs
    kb_variant = ,latin,
    kb_options = grp:alt_shift_toggle,grp_led:scroll
    follow_mouse = 1
    repeat_rate = 40
    repeat_delay = 300
    touchpad {
        natural_scroll = true
    }
}

# --- ENVIRONMENT VARIABLES -----------------------------------
env = GTK_THEME,breeze-dark
env = XDG_CURRENT_DESKTOP,Hyprland

env = XCURSOR_THEME,Breeze_Light
env = XCURSOR_SIZE,24

env = HYPRCURSOR_THEME,Breeze_Light
env = HYPRCURSOR_SIZE,24

# --- AUTOSTART ------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpaper &
exec-once = dunst &
exec-once = kdeconnectd &
exec-once = greenclip daemon &
exec-once = $HOME/dotfiles/i3/scripts/startup.sh
exec-once = xrdb -merge ~/.Xresources
exec-once = foot --server

# --- KEYBINDINGS ---------------------------------------------
bind = $mod, Return, exec, $term
bind = $mod SHIFT, Return, exec, $HOME/dotfiles/i3/scripts/sticky_term.sh
bind = $mod SHIFT, Q, killactive,
bind = $mod, D, exec, $menu
bind = $mod, F, fullscreen, 0
bind = $mod, T, togglefloating,
bind = $mod, E, exec, $fileManager
bind = $mod, J, movefocus, l
bind = $mod, K, movefocus, r
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d
bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, r
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Right, movewindow, r
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Down, movewindow, d
bind = $mod, A, focuswindow, parent
bind = $mod, R, submap, resize

bind = $mod, P, exec, hyprctl keyword monitor eDP-1,preferred,auto,1
bind = $mod SHIFT, P, exec, hyprctl keyword monitor eDP-1,disabled

bindm = $mod, mouse:1, movewindow
bindm = $mod, mouse:3, resizewindow

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Resize submap (like i3 mode)
submap = resize
  binde = , J, resizeactive, -10 0
  binde = , K, resizeactive, 10 0
  binde = , H, resizeactive, 0 -10
  binde = , L, resizeactive, 0 10
  binde = , Left, resizeactive, -10 0
  binde = , Right, resizeactive, 10 0
  binde = , Up, resizeactive, 0 -10
  binde = , Down, resizeactive, 0 10
  bind = , Escape, submap, reset
  bind = , Return, submap, reset
submap = reset

# Handling groups
group {
    col.border_active = $primary 
    col.border_inactive = $secondary
    
    groupbar {
        enabled = true
        font_family = JetBrainsMono Nerd Font
        font_size = 14
        gradients = true
        height = 18
        priority = 3
        render_titles = true
        scrolling = true
        # text_color = $background
        
        col.active = $primary
        col.inactive = $background
        col.locked_active = $secondary
        col.locked_inactive = $secondary
    }
}

bind = $mod, W, togglegroup,
bind = ALT, Left, changegroupactive, b
bind = ALT, Right, changegroupactive, f
bind = $mod CTRL, W, lockactivegroup, toggle
bind = $mod CTRL, U, moveoutofgroup,
bind = $mod CTRL, Left, moveintogroup, l
bind = $mod CTRL, Right, moveintogroup, r
bind = $mod CTRL, Up, moveintogroup, u  
bind = $mod CTRL, Down, moveintogroup, d

# System mode
bind = $mod, Escape, submap, system
submap = system
  bind = , L, exec, loginctl lock-session
  bind = , R, exec, systemctl reboot
  bind = , S, exec, systemctl suspend
  bind = SHIFT, S, exec, systemctl poweroff
  bind = , Escape, submap, reset
submap = reset

# Screenshot
bind = $mod SHIFT, S, exec, $HOME/dotfiles/i3/scripts/screenshot.sh

# Launch brave in scratchpad style
bind = $mod, G, exec, brave-browser

# --- SPECIAL KEYS --------------------------------------------
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# --- WINDOW RULES --------------------------------------------
windowrulev2 = workspace 1, class:^(Slack)$
windowrulev2 = workspace 2, class:^(code|vscodium|Code|VSCodium)$
windowrulev2 = workspace 3, class:^(brave-browser|Brave-browser)$
windowrulev2 = workspace 4, class:^(Postman)$
windowrulev2 = workspace 6, class:^(thunderbird|zoom)$
windowrulev2 = float, title:^(Meet)
windowrulev2 = float, class:^(fzf-menu)
windowrulev2 = float, title:^(sticky_.*)
windowrulev2 = pin, title:^(sticky_.*)

# --- STATUS BAR (use waybar) ---------------------------------
exec-once = waybar &

# --- DEFAULT WORKSPACE ---------------------------------------
exec-once = hyprctl dispatch workspace 1
