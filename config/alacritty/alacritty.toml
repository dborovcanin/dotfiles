[env]
TERM = "xterm-256color"

[font]
normal = { family = "CaskaydiaMono Nerd Font", style = "Regular" }
bold = { family = "CaskaydiaMono Nerd Font", style = "Bold" }
italic = { family = "CaskaydiaMono Nerd Font", style = "Italic" }
size = 8

[window]
padding.x = 2
padding.y = 2
opacity = 0.8

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" }
]

# Colors (Gruvbox dark)

# Default colors
[colors.primary]
# hard contrast background = = '#1d2021'
background = '#282828'
# soft contrast background = = '#32302f'
foreground = '#ebdbb2'

# Normal colors
[colors.normal]
black   = '#282828'
red     = '#cc241d'
green   = '#98971a'
yellow  = '#d79921'
blue    = '#458588'
magenta = '#b16286'
cyan    = '#689d6a'
white   = '#a89984'

# Bright colors
[colors.bright]
black   = '#928374'
red     = '#fb4934'
green   = '#b8bb26'
yellow  = '#fabd2f'
blue    = '#83a598'
magenta = '#d3869b'
cyan    = '#8ec07c'
white   = '#ebdbb2'

[[hints.enabled]]

# :line  | :line:col | #Lline | #Lline-Lend
regex = "((?:(?:\\./)?[^():\\s]+)\\.(?:go|rs|py|c|cpp|h|hpp|js|ts|lua|md|mdx|yaml|yml)(?:(?::[0-9]+(?::[0-9]+)?)|(?:#L[0-9]+(?:-L[0-9]+)?)))"

post_processing = true
persist = false

binding = { key = "E", mods = "Control|Shift" }
mouse = { enabled = true, mods = "Control" }

command = { program = "bash", args = [
  "-lc",
  '''
t="$1"

# strip punctuation
t="${t#(}"
t="${t%)}"
t="${t%,}"
t="${t%.}"

# GitHub style: file#L123-L140 -> file#L123
t="${t%%-L*}"

# file#L123 -> file:123
t="${t//#L/:}"

# file:123:45 -> file:123
case "$t" in
  *:*:*) t="${t%:*}" ;;
esac

file="${t%:*}"
line="${t##*:}"

exec alacritty -e vim +"$line" "$file"
''',
  "bash"
] }